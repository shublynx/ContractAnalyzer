name: Django Production CI

on:
  push:
    branches: [ "main", "feature/*" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build and Run Stack
        # We use 'run' instead of 'exec'. This starts the container, 
        # executes the command, and if it crashes, it shows the error immediately.
        run: |
          docker compose build
          
          echo "Running Migrations..."
          docker compose run --rm -e DATABASE_URL=postgres://admin:password123@db:5432/contractiq web python manage.py migrate
          
          echo "Setting up Vectors..."
          docker compose run --rm -e REDIS_HOST=redis web python manage.py setup_vectors
          
          echo "Running Tests..."
          docker compose run --rm -e DATABASE_URL=postgres://admin:password123@db:5432/contractiq -e REDIS_HOST=redis web python manage.py test contracts

      - name: Show Logs on Failure
        if: failure()
        run: docker compose logs