name: Django Production CI

on:
  push:
    branches: [ "main", "feature/*" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start Services
        # --wait ensures GitHub won't move to the next step 
        # until the DB healthcheck passes. No more 'sleep 20'!
        run: docker compose up -d --wait

      - name: Database Migrations
        run: docker compose exec -T web python manage.py migrate

      - name: Initialize Vector Search
        run: docker compose exec -T web python manage.py setup_vectors

      - name: Run Unit Tests
        run: docker compose exec -T web python manage.py test contracts

      - name: Security Check (Optional but Pro)
        run: docker compose exec -T web pip install safety && safety check

      - name: Shutdown
        if: always()
        run: docker compose down