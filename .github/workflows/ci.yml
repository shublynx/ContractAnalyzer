name: Django CI

on:
  push:
    # Trigger on all your feature branches and main
    branches: 
      - main
      - feature/*
  pull_request:
    # Trigger when you try to merge any feature branch into main
    branches: 
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build and Start Stack
        # Use the --wait flag to ensure DB and Redis are healthy 
        # before the next step runs
        run: docker compose up --build -d --wait

      - name: Run Migrations
        # Inside the 'web' container, prepare the PG database
        run: docker compose exec web python manage.py migrate

      - name: Initialize Redis Vector Index
        # This calls your custom command to prevent 'No such index' errors
        run: docker compose exec web python manage.py setup_vectors

      - name: Run Unit Tests
        # Run the tests we just verified locally on your HP Laptop
        run: docker compose exec web python manage.py test contracts

      - name: Cleanup Containers
        if: always()
        run: docker compose down