services:
  db:
    image: ankane/pgvector:v0.5.1
    environment:
      POSTGRES_DB: contractiq
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
    healthcheck:
      # This ensures Postgres is actually READY, not just "started"
      test: ["CMD-SHELL", "pg_isready -U admin -d contractiq"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis/redis-stack-server:latest
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  web:
    build: .
    # In production, variables are injected by the host/CI, not a loose .env file
    environment:
      - DATABASE_URL=postgres://admin:password123@db:5432/contractiq
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy