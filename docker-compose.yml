services:
  db:
    image: ankane/pgvector:v0.5.1
    # EXPLICIT BINDING: Force the host's loopback to talk to the container
    ports:
      - "127.0.0.1:5432:5432"
    
    environment:
      POSTGRES_DB: contractiq
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
    
    # Healthcheck: This allows other services (and you) to know 
    # when the DB is actually ready for queries, not just 'running'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d contractiq"]
      interval: 5s
      timeout: 5s
      retries: 5

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: